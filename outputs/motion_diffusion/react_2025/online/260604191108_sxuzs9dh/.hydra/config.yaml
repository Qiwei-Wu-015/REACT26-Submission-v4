data:
  data_name: react_2025
  _target_: dataset.react_2025.ReactionDataloader
  train_dataset:
    _target_: dataset.react_2025.ReactionDataset
    batch_size: ${trainer.batch_size}
    shuffle: true
    num_workers: 8
    root_dir: ${data_dir}
    split: train
    clip_length: 750
    target_size: 224
    crop_size: 224
    fps: 30
    audio_feature_type: wav2vec
    load_video_s: false
    load_video_l: false
    load_audio: true
    load_emotion_s: true
    load_emotion_l: true
    load_3dmm_s: true
    load_3dmm_l: true
    load_eeg_l: true
    eeg_dir_name: eeg_processed
    eeg_target_cols:
    - TP9
    - AF7
    - AF8
    - TP10
    - Delta_TP9
    - Theta_TP9
    - Alpha_TP9
    - Beta_TP9
    - Gamma_TP9
    - Delta_TP10
    - Theta_TP10
    - Alpha_TP10
    - Beta_TP10
    - Gamma_TP10
    eeg_channel_scale: 1000.0
    eeg_use_tar_fallback: true
    bidirectional: ${trainer.generic.bidirectional}
  validation_dataset:
    _target_: dataset.react_2025.ReactionDataset
    batch_size: ${trainer.batch_size}
    shuffle: false
    num_workers: 8
    root_dir: ${data_dir}
    split: val
    target_size: 224
    crop_size: 224
    clip_length: 750
    fps: 30
    audio_feature_type: wav2vec
    load_video_s: false
    load_video_l: false
    load_audio: true
    load_emotion_s: true
    load_emotion_l: true
    load_3dmm_s: true
    load_3dmm_l: true
    load_eeg_l: true
    eeg_dir_name: eeg_processed
    eeg_target_cols:
    - TP9
    - AF7
    - AF8
    - TP10
    - Delta_TP9
    - Theta_TP9
    - Alpha_TP9
    - Beta_TP9
    - Gamma_TP9
    - Delta_TP10
    - Theta_TP10
    - Alpha_TP10
    - Beta_TP10
    - Gamma_TP10
    eeg_channel_scale: 1000.0
    eeg_use_tar_fallback: true
    bidirectional: ${trainer.generic.bidirectional}
  test_dataset:
    _target_: dataset.react_2025.ReactionDataset
    batch_size: ${trainer.batch_size}
    shuffle: false
    num_workers: 4
    root_dir: ${data_dir}
    split: test
    target_size: 224
    crop_size: 224
    clip_length: 750
    fps: 30
    audio_feature_type: wav2vec
    load_video_s: false
    load_video_l: false
    load_audio: true
    load_emotion_s: true
    load_emotion_l: true
    load_3dmm_s: true
    load_3dmm_l: true
    load_eeg_l: ${trainer.generic.eval_eeg}
    eeg_dir_name: eeg_processed
    eeg_target_cols:
    - TP9
    - AF7
    - AF8
    - TP10
    - Delta_TP9
    - Theta_TP9
    - Alpha_TP9
    - Beta_TP9
    - Gamma_TP9
    - Delta_TP10
    - Theta_TP10
    - Alpha_TP10
    - Beta_TP10
    - Gamma_TP10
    eeg_channel_scale: 1000.0
    eeg_use_tar_fallback: true
    bidirectional: ${trainer.generic.bidirectional}
trainer:
  model:
    loss:
      _target_: framework.utils.losses.DiffusionLoss
      losses_type: MSELossApt
      losses_multiplier: 1.0
      n_preds: ${trainer.${trainer.trainer_mode}.num_preds}
      temporal_loss_w: 0.0
      prior_loss_weight: 1.0
      eeg_loss_weight: 0.25
      w_au: 1.0
      w_va: 5.0
      w_em: 5.0
    audio_encoder:
      type: AudioEmbedder
      _target_: dataset.modules.audio_embedder.AudioEmbedder
      checkpoint_path: ''
      skip_norm: true
    diff_model:
      model_name: LatentMLPMatcher
      _target_: framework.motion_diffusion.diffusion.matchers.LatentMatcher
      eeg_head:
        enabled: true
        output_dim: 14
        hidden_dim: 256
        dropout: 0.5
        pooling: mean
        detach_prediction_emotion: true
        use_speaker_audio: true
        use_speaker_emotion: true
        use_speaker_3dmm: true
        use_prediction_emotion: true
      diffusion_prior:
        type: DiffusionPriorNetwork
        args:
          emb_preprocessing: normalize
          freeze_encoder: true
          audio_dim: 768
          window_size: ${trainer.${trainer.trainer_mode}.window_size}
          s_ratio: ${trainer.${trainer.trainer_mode}.s_ratio}
          token_len: 750
          _3dmm_dim: 58
          speaker_emb_dim: 512
          latent_dim: 512
          depth: 4
          num_time_layers: 2
          num_time_embeds: 1
          num_time_emb_channels: 64
          time_last_act: false
          use_learned_query: true
          s_audio_cond_drop_prob: 0.2
          s_latentemb_cond_drop_prob: 1.0
          s_3dmm_cond_drop_prob: 0.2
          guidance_scale: 1.0
          dim_head: 64
          heads: 8
          ff_mult: 4
          norm_in: false
          norm_out: true
          attn_dropout: 0.0
          ff_dropout: 0.0
          final_proj: true
          normformer: false
          rotary_emb: true
        scheduler:
          noise_schedule: cosine
          timestep_spacing: leading
          num_train_timesteps: 1000
          num_inference_timesteps: 50
          predict: start_x
          var_type: fixed_large
          rescale_timesteps: false
          noise_std: 1
          num_preds: ${trainer.${trainer.trainer_mode}.num_preds}
      diffusion_decoder:
        type: TransformerDenoiser
        args:
          emb_preprocessing: normalize
          freeze_encoder: true
          window_size: ${trainer.${trainer.trainer_mode}.window_size}
          s_ratio: ${trainer.${trainer.trainer_mode}.s_ratio}
          token_len: 750
          encode_emotion: false
          encode_3dmm: false
          ablation_skip_connection: true
          nfeats: 25
          latent_dim: 512
          ff_size: 1024
          num_layers: 9
          num_heads: 8
          dropout: 0.1
          normalize_before: false
          activation: gelu
          flip_sin_to_cos: true
          return_intermediate_dec: false
          position_embedding: learned
          arch: trans_dec
          freq_shift: 0
          time_encoded_dim: 64
          s_audio_dim: 768
          s_audio_scale: 1.0
          s_emotion_dim: 25
          l_embed_dim: 512
          s_embed_dim: 512
          personal_emb_dim: 512
          s_3dmm_dim: 58
          concat: concat_first
          guidance_scale: 1.0
          s_audio_enc_drop_prob: 0.2
          s_latent_embed_drop_prob: 1.0
          s_3dmm_enc_drop_prob: 0.2
          s_emotion_enc_drop_prob: 0.2
          past_l_emotion_drop_prob: 1.0
          use_past_frames: false
        scheduler:
          noise_schedule: cosine
          timestep_spacing: leading
          num_train_timesteps: 1000
          num_inference_timesteps: 50
          predict: start_x
          var_type: fixed_large
          rescale_timesteps: false
          noise_std: 1
          num_preds: ${trainer.${trainer.trainer_mode}.num_preds}
  optim:
    _target_: torch.optim.AdamW
    weight_decay: 0.0001
    betas:
    - 0.9
    - 0.999
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    eta_min: 0
    last_epoch: -1
  criterion:
    _target_: framework.utils.losses.DiffusionLoss
    losses_type: MSELossApt
    losses_multiplier: 1.0
    n_preds: ${trainer.${trainer.trainer_mode}.num_preds}
    temporal_loss_w: 0.0
    prior_loss_weight: 1.0
    eeg_loss_weight: 0.25
    w_au: 1.0
    w_va: 5.0
    w_em: 5.0
  model_name: motion_diffusion
  _target_: trainer.motion_diffusion.Trainer
  trainer_mode: generic
  folder: save/${trainer.model_name}/${data.data_name}/${task}
  ckpt_dir: ${get_last_checkpoint:${trainer.folder}}
  resumed_training: ${resume}
  current_runid: ${run_id}
  resume_runid: ${resume_id}
  batch_size: 8
  post_config_name: configs/model/emotion_autoencoder.yaml
  post_clip_length: 1000
  data_clamp: true
  generic:
    seed: 1234
    start_epoch: 0
    epochs: 500
    lr: 0.0001
    model: LatentMatcher
    clip_grad: false
    num_workers: 16
    log_dir: log
    tb_dir: tb_logs
    out_dir: results
    save_period: 10
    val_period: 10
    num_preds: 10
    clip_length: 750
    window_size: 30
    s_ratio: 2
    train_eeg_head_only: false
    pretrained_decoder_checkpoint: ''
    pretrained_prior_checkpoint: ''
    pretrained_load_prior: true
    eval_eeg: true
    bidirectional: true
  renderer:
    name: PIRenderer
    _target_: utils.render.Render
    do_render: false
logger:
  logger_name: none
  version: ${run_id}
  logger_dir: tb_logs
  project: null
path:
  deps: ${code_path:./deps}
  datasets: ${code_path:./datasets}
  code_dir: ${code_path:}
  working_dir: ${working_path:""}
seed: 1234
logger_level: INFO
task: online
stage: fit
data_dir: /data2/REACT2025-NEW
resume: false
run_id: ${generate_id:}
resume_id: ''
num_gts: 10
